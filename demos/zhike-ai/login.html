<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 智客 AI 智能客服系统</title>
<link rel="stylesheet" href="css/common.css">
<style>
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #FFF8F3 0%, #FFE5D5 50%, #FFD4B8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before, body::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
  }
  body::before { width: 400px; height: 400px; background: #FF6B35; top: -100px; left: -100px; }
  body::after  { width: 500px; height: 500px; background: #FFB627; bottom: -150px; right: -150px; }
  .login-container {
    display: flex;
    width: 920px;
    max-width: 95%;
    min-height: 560px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(255, 107, 53, 0.15);
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  .login-brand {
    flex: 1;
    background: linear-gradient(135deg, #FF6B35 0%, #FF8A5B 50%, #FFB627 100%);
    color: white;
    padding: 56px 48px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .login-brand::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 50%;
  }
  .login-brand::after {
    content: '';
    position: absolute;
    bottom: -100px; left: -80px;
    width: 280px; height: 280px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 50%;
  }
  .brand-logo { display: flex; align-items: center; gap: 12px; margin-bottom: auto; position: relative; }
  .brand-logo-icon { width: 48px; height: 48px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .brand-logo-text { font-size: 22px; font-weight: 700; }
  .brand-content { position: relative; }
  .brand-content h1 { font-size: 32px; font-weight: 700; line-height: 1.3; margin-bottom: 16px; }
  .brand-content p { font-size: 15px; line-height: 1.7; opacity: 0.92; }
  .brand-features { margin-top: 36px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; position: relative; }
  .brand-feature { display: flex; align-items: center; gap: 8px; font-size: 13px; background: rgba(255, 255, 255, 0.15); padding: 10px 14px; border-radius: 8px; backdrop-filter: blur(10px); }
  .login-form { flex: 1; padding: 56px 56px 40px; display: flex; flex-direction: column; }
  .login-form h2 { font-size: 26px; font-weight: 600; margin-bottom: 8px; }
  .login-form .sub { color: var(--color-text-soft); font-size: 14px; margin-bottom: 32px; }
  .form-tabs { display: flex; gap: 24px; margin-bottom: 24px; border-bottom: 1px solid var(--color-border-light); }
  .form-tab { padding-bottom: 12px; font-size: 14px; color: var(--color-text-soft); cursor: pointer; position: relative; }
  .form-tab.active { color: var(--color-primary); font-weight: 500; }
  .form-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--color-primary); border-radius: 2px 2px 0 0; }
  .input-row { display: flex; align-items: center; height: 44px; border: 1px solid var(--color-border); border-radius: 8px; padding: 0 12px; gap: 8px; transition: border-color 0.15s, box-shadow 0.15s; }
  .input-row:focus-within { border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1); }
  .input-row .icon { color: var(--color-text-light); font-size: 16px; }
  .input-row input { flex: 1; border: none; background: transparent; font-size: 14px; height: 100%; }
  .form-options { display: flex; justify-content: space-between; align-items: center; margin: 16px 0 24px; font-size: 13px; }
  .form-options label { display: flex; align-items: center; gap: 6px; color: var(--color-text-soft); }
  .form-options input[type=checkbox] { accent-color: var(--color-primary); }
  .form-options a { color: var(--color-primary); }
  .login-btn { height: 44px; background: linear-gradient(135deg, #FF6B35 0%, #FF4757 100%); color: white; border-radius: 8px; font-size: 15px; font-weight: 600; width: 100%; box-shadow: 0 6px 16px rgba(255, 71, 87, 0.3); transition: transform 0.15s; cursor: pointer; }
  .login-btn:hover { transform: translateY(-1px); }
  .login-btn:active { transform: translateY(0); }
  .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .divider-text { text-align: center; color: var(--color-text-light); font-size: 12px; margin: 24px 0 16px; position: relative; }
  .divider-text::before, .divider-text::after { content: ''; position: absolute; top: 50%; width: calc(50% - 60px); height: 1px; background: var(--color-border-light); }
  .divider-text::before { left: 0; } .divider-text::after { right: 0; }
  .social-row { display: flex; justify-content: center; gap: 16px; }
  .social-btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--color-border); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: all 0.15s; }
  .social-btn:hover { border-color: var(--color-primary); transform: translateY(-2px); }
  .login-footer { margin-top: auto; padding-top: 20px; text-align: center; color: var(--color-text-light); font-size: 12px; }
  .login-footer a { color: var(--color-primary); cursor: pointer; }
  .error-msg { color: var(--color-danger); font-size: 12px; margin-top: 4px; display: none; }
  .error-msg.show { display: block; }
  @media (max-width: 768px) { .login-brand { display: none; } .login-form { padding: 40px 28px; } }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-brand">
    <div class="brand-logo"><div class="brand-logo-icon">🤖</div><div class="brand-logo-text">智客 AI</div></div>
    <div class="brand-content">
      <h1>让客服更高效<br>让生意更简单</h1>
      <p>面向中小电商商家的轻量级 AI 智能客服系统<br>24 小时自动应答，降低人工成本 70%</p>
      <div class="brand-features">
        <div class="brand-feature">⚡ 1 秒响应</div>
        <div class="brand-feature">🎯 87% 解决率</div>
        <div class="brand-feature">🌙 7×24 在线</div>
        <div class="brand-feature">🛒 多平台接入</div>
      </div>
    </div>
  </div>
    <div class="login-form">
      <h2>欢迎回来 👋</h2>
      <p class="sub">作品集演示版可直接进入体验</p>
      <div class="form-tabs">
      <div class="form-tab active" data-tab="login">演示体验</div>
      <div class="form-tab" data-tab="register">账号模式</div>
    </div>
    <div class="form-group demo-field">
      <label class="form-label">账号</label>
      <div class="input-row">
        <span class="icon">👤</span>
        <input type="text" id="username" placeholder="演示账号" value="18867988064" readonly>
      </div>
    </div>
    <div class="form-group demo-field">
      <label class="form-label">密码</label>
      <div class="input-row">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="演示密码" value="test123" readonly>
        <span class="icon" style="cursor:pointer" onclick="togglePwd()">👁️</span>
      </div>
      <div class="error-msg" id="error-msg"></div>
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">进入演示</button>
    <div class="login-footer" style="margin-top:16px">
      无需账号密码，点击即可查看 Web 端原型
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
let currentTab = 'login';

// Tab 切换
document.querySelectorAll('.form-tab').forEach(el => {
  el.addEventListener('click', () => switchTab(el.dataset.tab));
});

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.form-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.form-tab[data-tab="${tab}"]`).classList.add('active');
  const btn = document.getElementById('login-btn');
  const readonly = tab === 'login';
  document.getElementById('username').readOnly = readonly;
  document.getElementById('password').readOnly = readonly;
  btn.textContent = tab === 'login' ? '进入演示' : '注 册';
  hideError();
}

function togglePwd() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('error-msg').classList.remove('show');
}

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = '处理中...';
  hideError();

  try {
    let result;
    if (currentTab === 'login') {
      saveToken('portfolio-demo-token');
      saveUser({ id: 1, nickname: '演示用户' });
      window.location.href = 'dashboard.html';
      return;
    } else {
      if (!username || !password) { showError('请填写完整信息'); return; }
      result = await AuthAPI.register(null, username, password);
    }
    if (result) {
      saveToken(result.access_token);
      window.location.href = 'dashboard.html';
    }
  } catch (err) {
    showError(err.message || '登录失败，请重试');
  } finally {
    btn.disabled = false;
    btn.textContent = currentTab === 'login' ? '进入演示' : '注 册';
  }
}

// 回车提交
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// 已登录自动跳转
if (getToken()) { window.location.href = 'dashboard.html'; }
</script>
</body>
</html>
